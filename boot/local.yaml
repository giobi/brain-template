# boot/local.yaml — Dove gira questo brain
#
# Descrive la macchina e le capability disponibili.
# Aggiorna quando cambia l'infrastruttura.

# === Identita' macchina ===
platform: local               # server | local | container
hostname: ""
os: ""
arch: ""

# === Capability ===
